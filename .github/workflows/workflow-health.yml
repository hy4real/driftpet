name: Repo Checks

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  repo-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run repo checks
        run: npm run check:repo
