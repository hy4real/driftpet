name: Workflow Health

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  workflow-health:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run workflow refresh
        run: npm run workflow:refresh

      - name: Check workflow health
        run: npm run workflow:check
